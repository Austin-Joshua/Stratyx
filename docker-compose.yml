services:
  mongodb:
    image: mongo:7
    container_name: stratyx-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: golang:1.24
    container_name: stratyx-backend
    working_dir: /app/backend
    command: sh -c "go mod tidy && go run ./cmd/server"
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DATABASE=stratyx
      - JWT_SECRET=dev-secret
      - ALLOWED_ORIGIN=http://localhost:3000
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    depends_on:
      - mongodb

  frontend:
    image: node:22
    container_name: stratyx-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
